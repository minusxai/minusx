name: QA Flows

# PRs only. The same code is validated on the PR before merge, and QA Flows is the
# slow + real-LLM (cost) job — re-running it on the post-merge main push is pure
# redundancy. The deploy ("Publish Docker Images") is a separate workflow not gated
# by this one, and the deploys repo runs QA against the live deployment after deploy.
on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

# QA is split into a single build job + N parallel flow-shard jobs so no single job
# exceeds ~2 minutes:
#   qa-build  — produces the prod-ish server ONCE (Turbopack build → .next-qa) and
#               uploads it as an artifact.
#   qa-flows  — sharded matrix: each downloads the build, `next start`s it (NO rebuild,
#               via QA_SKIP_BUILD), and runs its slice of the flows. Sharding across
#               separate runners raises total LLM concurrency WITHOUT over-pressuring
#               any single runner (each still runs ≤ QA_PARALLELISM workers).
#   qa        — aggregator; keeps the "QA Flows (prod build)" status name stable.
#
# Fidelity note: the deploy path still runs a real webpack `next build` (publish.yml),
# and the deploys repo runs QA against the live deployment post-deploy — so the
# webpack/standalone/AWS-SDK packaging path (the one that broke in prod) is still
# exercised before release; PR-time QA trades that for speed via the Turbopack build.
jobs:
  qa-build:
    name: QA Build (turbopack)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # Share the node_modules cache with the test/e2e workflows (same key).
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: ./frontend/node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('./frontend/package-lock.json', './frontend/package.json', './frontend/patches/**') }}

      - name: Install frontend dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm ci

      # NOTE: no Turbopack compiler-cache step. `next build --turbopack` gets no
      # meaningful speedup from a restored .next/cache (measured on the E2E build:
      # 69s warm == 71s cold on an exact hit) — Next 16 has no effective persistent
      # build cache — so caching it was pure overhead (~9s restore + ~11s save).

      # Turbopack prod build (~4x faster than webpack) into .next-qa. E2E_MODE stays
      # off (no NEXT_PUBLIC_E2E) — the runtime `?e2e=<secret>` gate does the work.
      - name: Build QA server (turbopack)
        working-directory: ./frontend
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}
          NEXT_DIST_DIR: .next-qa
          NODE_OPTIONS: '--max-old-space-size=8192'
          # Skip the in-build tsc/eslint passes — the `validate` job gates types+lint.
          NEXT_SKIP_TYPECHECK: 'true'
          # Required at build time: "Collecting page data" executes the auth route
          # modules and lib/config.ts throws if NEXTAUTH_SECRET is unset. (Sessions
          # are signed at runtime with the flows step's own value; this just needs
          # to be non-empty for the build.)
          NEXTAUTH_SECRET: qa-ci-secret-not-used-in-prod-0000000000000000=
        run: npx next build --turbopack

      # Package the build into a single tar BEFORE upload. Turbopack emits chunk
      # files with a colon in the name (e.g. `[externals]_node:inspector_….js`),
      # which upload-artifact@v4 rejects as invalid paths ("Contains the character
      # Colon :"). A tar sidesteps that (colons are legal inside the archive; only
      # the one `.tar` filename is uploaded) and makes up/download faster.
      # `next start` needs .next-qa/server + static + manifests only — NOT the
      # standalone/ copy (341M, for `node server.js`) or cache/ (kept on disk for the
      # Turbopack cache save), so both are excluded to keep the tar small (~190M).
      - name: Package QA build
        working-directory: ./frontend
        run: tar -cf next-qa.tar --exclude='.next-qa/standalone' --exclude='.next-qa/cache' .next-qa

      - name: Upload QA build artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-next-build
          path: ./frontend/next-qa.tar
          retention-days: 1
          compression-level: 1

  qa-flows:
    name: QA Flows — shard ${{ matrix.shard }}/3
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: qa-build
    strategy:
      # Run all shards to completion even if one fails so we surface all
      # failures in a single CI cycle.
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: ./frontend/node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('./frontend/package-lock.json', './frontend/package.json', './frontend/patches/**') }}

      - name: Install frontend dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        working-directory: ./frontend
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: cache-browsers
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      # No --with-deps: binary comes from the cache above; ubuntu-latest preinstalls
      # Playwright's system libs, so the ~13s apt step every run buys nothing.
      - name: Install Playwright Chromium
        working-directory: ./frontend
        run: npx playwright install chromium

      # Restore the prod-ish build produced once by qa-build; QA_SKIP_BUILD below then
      # makes the Playwright webServer `next start` it directly (no per-shard rebuild).
      # The artifact is a tar (see qa-build's colon-filename note) — download it into
      # frontend/ and extract in place, recreating .next-qa/.
      - name: Download QA build artifact
        uses: actions/download-artifact@v4
        with:
          name: qa-next-build
          path: ./frontend

      - name: Extract QA build
        working-directory: ./frontend
        run: tar -xf next-qa.tar && rm next-qa.tar

      # No QA_BASE_URL → the QA config `next start`s the restored build and runs its
      # shard of the flows against it in tutorial mode. mxfood sample data seeds via the
      # public release download (no S3 creds in CI → local object store).
      - name: Run QA flows (shard ${{ matrix.shard }}/3)
        working-directory: ./frontend
        env:
          NEXTAUTH_SECRET: qa-ci-secret-not-used-in-prod-0000000000000000=
          CI: 'true'
          # The build is pre-supplied as an artifact → skip the webServer's build step.
          QA_SKIP_BUILD: '1'
          # 2 workers/runner across 3 shards = 6 total LLM concurrency (Bedrock Haiku
          # handles this comfortably) while keeping per-runner pressure ≤ the old single
          # job's 3 workers.
          QA_PARALLELISM: '2'
          # No S3 in CI, so chart→image attachments would otherwise become
          # http://localhost URLs, which the Claude API rejects ("Only HTTPS URLs
          # are supported"). Embedding charts as base64 data URLs lets the real-LLM
          # flows exercise the chart-image pipeline faithfully. (Prod uses S3 → HTTPS.)
          USE_BASE64_UPLOADS: 'true'
          # Real-LLM QA flows (test/qa/chat-flow.spec.ts) run when a provider
          # credential is present. Model config is DB-only in the app: these are
          # RUNNER-side env — auth.setup seeds them into the workspace's in-app
          # LLM config via /api/configs. We run on Bedrock — the SAME provider as
          # prod — with the model named by the ANALYST_AGENT_MODEL_CONFIG secret
          # ({provider, model, options?} JSON) to keep calls cheap + fast.
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          ANALYST_AGENT_MODEL_CONFIG: ${{ secrets.ANALYST_AGENT_MODEL_CONFIG }}
        run: npm run test:qa -- --shard=${{ matrix.shard }}/3

      - name: Upload QA report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-shard-${{ matrix.shard }}
          path: ./frontend/playwright-report/
          retention-days: 7

  # Aggregator — this job's `name:` ("QA Flows (prod build)") is the stable status
  # name PRs reference. It depends on every flow shard and fails if any did not pass.
  qa:
    name: QA Flows (prod build)
    runs-on: ubuntu-latest
    needs: [qa-flows]
    if: always()
    steps:
      - name: Verify all QA flow shards passed
        run: |
          result='${{ needs.qa-flows.result }}'
          echo "QA flow shard matrix result: $result"
          if [[ "$result" != "success" ]]; then
            echo "::error::One or more QA flow shards did not pass (result: $result)"
            exit 1
          fi
          echo "All QA flow shards passed."
