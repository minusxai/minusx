name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # Share the node_modules cache with the test/validate workflow (same key).
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: ./frontend/node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('./frontend/package-lock.json', './frontend/package.json', './frontend/patches/**') }}

      - name: Install frontend dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm ci

      # Cache the Playwright browser binaries by the installed Playwright version.
      - name: Resolve Playwright version
        id: pw
        working-directory: ./frontend
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: cache-browsers
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        working-directory: ./frontend
        env:
          # E2E boots the app under E2E_MODE (faux LLM); only NEXTAUTH_SECRET is
          # required at boot. The webServer (playwright.config) sets the rest.
          NEXTAUTH_SECRET: e2e-ci-secret-not-used-in-prod-000000000000000=
          CI: 'true'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./frontend/playwright-report/
          retention-days: 7
