name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # Share the node_modules cache with the test/validate workflow (same key).
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: ./frontend/node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('./frontend/package-lock.json', './frontend/package.json', './frontend/patches/**') }}

      - name: Install frontend dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm ci

      # Cache the Playwright browser binaries by the installed Playwright version.
      - name: Resolve Playwright version
        id: pw
        working-directory: ./frontend
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: cache-browsers
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      # Cache Turbopack's incremental compiler cache so unchanged modules aren't
      # recompiled across PR pushes; restore-keys falls back to the newest cache.
      - name: Cache Turbopack compiler cache (E2E build)
        uses: actions/cache@v4
        with:
          path: ./frontend/.next-e2e/cache
          key: nextjs-e2e-${{ runner.os }}-${{ hashFiles('./frontend/package-lock.json') }}-${{ hashFiles('./frontend/**/*.ts', './frontend/**/*.tsx', '!./frontend/node_modules/**') }}
          restore-keys: |
            nextjs-e2e-${{ runner.os }}-${{ hashFiles('./frontend/package-lock.json') }}-

      # Build the app ONCE (Turbopack, ~4x faster than webpack) with NEXT_PUBLIC_E2E
      # baked in so E2E_MODE is permanently on (faux LLM channel + window store).
      # Precompiled routes make the E2E boot + auth near-instant vs the old `next dev`
      # on-demand-compile tax (auth.setup alone was ~54s under dev, ~1.4s prebuilt).
      - name: Build E2E server (turbopack)
        working-directory: ./frontend
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}
          NEXT_DIST_DIR: .next-e2e
          NEXT_PUBLIC_E2E: 'true'
          NODE_OPTIONS: '--max-old-space-size=8192'
          # Skip the in-build tsc/eslint passes — the `validate` job gates types+lint.
          NEXT_SKIP_TYPECHECK: 'true'
          # Required at build time: "Collecting page data" executes the auth route
          # modules and lib/config.ts throws if NEXTAUTH_SECRET is unset.
          NEXTAUTH_SECRET: e2e-ci-secret-not-used-in-prod-000000000000000=
        run: npx next build --turbopack

      - name: Run Playwright E2E
        working-directory: ./frontend
        env:
          # E2E boots the app under E2E_MODE (faux LLM); only NEXTAUTH_SECRET is
          # required at boot. The webServer (playwright.config) sets the rest.
          NEXTAUTH_SECRET: e2e-ci-secret-not-used-in-prod-000000000000000=
          CI: 'true'
          # The app is pre-built above → the webServer `next start`s .next-e2e
          # (no per-run `next dev` build).
          E2E_SKIP_BUILD: '1'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./frontend/playwright-report/
          retention-days: 7
