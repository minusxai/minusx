name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3). Leave blank to skip the build and just deploy the current latest image.'
        required: false
        type: string
      deploy_staging:
        description: 'Deploy staging after this run'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip the (re)build on a manual run with no version — that's a deploy-only run.
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.version == '') }}
    strategy:
      matrix:
        include:
          - image: minusx-frontend
            canary_image: minusx-frontend-canary
            context: frontend
            dockerfile: frontend/Dockerfile
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event_name == 'push' && github.ref_type == 'branch' && matrix.canary_image || matrix.image }}
          tags: |
            type=sha,prefix=,enable=${{ github.event_name == 'push' && github.ref_type == 'branch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref_type == 'branch' }}
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
            NEXT_PUBLIC_DEFAULT_ANALYTICS_CONFIG=${{ secrets.NEXT_PUBLIC_DEFAULT_ANALYTICS_CONFIG }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: publish
    runs-on: ubuntu-latest
    # Deploy staging when:
    #   - a push lands on main (publish just rebuilt the canary `latest` tag), or
    #   - a manual run ticks "Deploy staging" (with or without a version rebuild).
    # always() lets this run even when publish is skipped (deploy-only manual run);
    # the result != 'failure' guard still blocks deploy if a rebuild failed.
    if: |
      always() && needs.publish.result != 'failure' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_staging)
      )
    steps:
      - name: Trigger staging deploy in minusxai/deploys
        env:
          GH_TOKEN: ${{ secrets.DEPLOYS_DISPATCH_TOKEN }}
        run: |
          gh workflow run mxbi-oss-staging-deploy.yaml \
            --repo minusxai/deploys \
            --ref main
