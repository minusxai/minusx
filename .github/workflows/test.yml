name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# GitHub will force actions/* @v4 onto Node.js 24 on June 2nd, 2026. Opting in
# now silences the deprecation warning and ensures the workflow keeps running
# unchanged through the cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Restrict GITHUB_TOKEN to the minimum the workflow needs.
permissions:
  contents: read

jobs:
  validate:
    name: Validate (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: ./frontend/node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('./frontend/package-lock.json', './frontend/package.json', './frontend/patches/**') }}

      - name: Install frontend dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm ci

      - name: Validate (typecheck + lint)
        working-directory: ./frontend
        run: npm run validate

  # Sharded test execution. Vitest distributes test files evenly across shards
  # (by file hash), so each shard runs ~a sixth of the suite in parallel. The
  # shards share the node_modules cache via the same key as the validate job.
  # 6 shards keeps each shard's test step (~65s) + fixed job overhead (~24s)
  # comfortably under the 2-minute target.
  test-frontend-shard:
    name: Frontend Tests — shard ${{ matrix.shard }}/6
    runs-on: ubuntu-latest
    strategy:
      # Run all shards to completion even if one fails so we surface all
      # failures in a single CI cycle.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: ./frontend/node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('./frontend/package-lock.json', './frontend/package.json', './frontend/patches/**') }}

      - name: Install frontend dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests (shard ${{ matrix.shard }}/6)
        working-directory: ./frontend
        run: npm test -- --max-workers=4 --shard=${{ matrix.shard }}/6

  # Aggregator job — this is the required-check name in branch protection. It
  # depends on every shard and fails if any of them failed. Keeping a single
  # required check decouples branch protection from how many shards we use, so
  # bumping shard count later (2→4→6) only edits the matrix above.
  test-frontend:
    # NOTE: this job's `name:` is the required-check string on PRs — DO NOT
    # rename it without updating the branch protection rule.
    name: Frontend Tests (Chat API, E2E, MinusX Agent)
    runs-on: ubuntu-latest
    needs: [test-frontend-shard]
    if: always()
    steps:
      - name: Verify all test shards passed
        run: |
          result='${{ needs.test-frontend-shard.result }}'
          echo "Shard matrix result: $result"
          if [[ "$result" != "success" ]]; then
            echo "::error::One or more test shards did not pass (result: $result)"
            exit 1
          fi
          echo "All shards passed."
