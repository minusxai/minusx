name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Validate (typecheck + lint)
        working-directory: ./frontend
        run: npm run validate

  test-frontend:
    # NOTE: this job's `name:` is the required-check string on PRs — DO NOT
    # rename it without updating the branch protection rule.
    name: Frontend Tests (Chat API, E2E, MinusX Agent)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # Coverage only on push to main (slow instrumentation + report build).
      # PR runs skip it; if you want it locally, run `npm test -- --coverage`.
      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test -- --max-workers=3 ${{ github.event_name == 'pull_request' && '' || '--coverage' }}
