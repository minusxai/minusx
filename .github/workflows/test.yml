name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Restrict GITHUB_TOKEN to the minimum the workflow needs. CodeQL flags
# workflows without an explicit permissions block (medium severity).
# Both jobs only read repo contents (checkout + install + run); they do
# not push, comment, deploy, or call any other GitHub API.
permissions:
  contents: read

jobs:
  validate:
    name: Validate (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # Cache the resolved node_modules (not just the npm download cache).
      # Key invalidates on lockfile, package.json (postinstall script), or any
      # patch-package patch change — everything that can alter the final tree.
      # The two parallel jobs share this cache via the same key.
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: ./frontend/node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('./frontend/package-lock.json', './frontend/package.json', './frontend/patches/**') }}

      - name: Install frontend dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm ci

      - name: Validate (typecheck + lint)
        working-directory: ./frontend
        run: npm run validate

  test-frontend:
    # NOTE: this job's `name:` is the required-check string on PRs — DO NOT
    # rename it without updating the branch protection rule.
    name: Frontend Tests (Chat API, E2E, MinusX Agent)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: ./frontend/node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('./frontend/package-lock.json', './frontend/package.json', './frontend/patches/**') }}

      - name: Install frontend dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test -- --coverage --max-workers=3
