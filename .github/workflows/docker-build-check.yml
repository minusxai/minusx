# Validates the production Docker image builds on PRs — without pushing or
# deploying anything. Exists because the publish workflow only runs on merge
# to main, so Dockerfile/patches/lockfile breakage was invisible in PR CI
# (e.g. the pi-ai patch guard pointing at a renamed package path).
#
# Path-filtered to the files that can actually break the image build; a full
# image build is too slow to run on every PR.
name: Docker Build Check

on:
  pull_request:
    paths:
      - 'frontend/Dockerfile'
      - 'frontend/patches/**'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/.npmrc'
      - 'frontend/next.config.ts'
      - 'frontend/scripts/copy-duckdb-wasm.mjs'
      - '.github/workflows/docker-build-check.yml'

jobs:
  build-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Mirrors the publish job's build (same context, args, secrets) with
      # push: false — build validation only, nothing leaves the runner.
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
            NEXT_PUBLIC_DEFAULT_ANALYTICS_CONFIG=${{ secrets.NEXT_PUBLIC_DEFAULT_ANALYTICS_CONFIG }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha
