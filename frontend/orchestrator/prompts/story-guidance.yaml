# Story authoring guidance ("mini-skills") returned with Clarify picks.
#
# - `templates:` — FULL definitions of the story templates (structural genres). Projected
#   into the registry by lib/data/story/story-templates.ts; the `guidance` block is returned
#   verbatim to the agent when the user picks that template (Clarify `type: 'template'`).
# - `themes:` — authoring guidance ONLY for the six design themes (their code entries + CSS
#   tokens live in lib/data/story/story-themes.ts, which must stay YAML-free so tsx scripts
#   can import it). Returned with the Clarify `type: 'design'` pick.
#
# Style contract for guidance blocks (learned from claude.ai/design's system readmes):
# a personality statement, the beat structure, the layout grammar, a SELF-DOCUMENTING skeleton
# (placeholder copy teaches the rule it sits in), and blunt Do/Don't lists. Keep each compact.
# Everything must respect the story platform rules: container variants (@2xl:) not viewport
# variants, no position:fixed/sticky, every data number a live embed, Vega for every chart.

templates:
  editorial:
    label: Editorial
    description: Long-read magazine feature — hero, numbered chapters, one full-bleed interlude, a takeaway.
    personality: >-
      Confident, literary data journalism in the tradition of a NYT feature or a Stripe annual
      letter. The scroll is the pacing, headlines carry the argument, and width contrast — narrow
      prose against wide evidence — is the design.
    beats:
      - Hero
      - Chapters (3-5, one claim each)
      - Full-bleed interlude
      - Nuance chapter
      - Takeaway
    guidance: |-
      ## Editorial — long-read feature

      Voice: a magazine feature, not a report. Reading only the headlines must deliver the whole
      argument; each is a claim with a number where the data allows.

      Beats: Hero → Chapters (3-5, one idea = one section = one visual) → ONE full-bleed
      interlude → a nuance chapter (name the caveat inside the win) → Takeaway.

      Layout grammar
      - Width contrast IS the design: body copy capped at `max-w-prose`; charts break WIDER
        (`max-w-4xl`) or full-bleed (`-mx-6 @2xl:-mx-12`). Never let prose run full width.
      - Oversized low-contrast chapter numerals (`text-7xl font-bold text-muted-foreground/25`)
        pace the scroll.
      - Alternate section backgrounds (`bg-background` / `bg-muted`); the interlude is the ONE
        inverted band (`bg-foreground text-background`) holding a single huge live number.
      - Asymmetry over symmetry: `@3xl:grid-cols-[3fr_2fr]` splits, not centered stacks.

      Skeleton (the placeholder copy states the rule it demonstrates):

      <div data-design="tw" class="@container px-6 @2xl:px-12">
        <header class="py-16 @2xl:py-24 max-w-4xl">
          <p class="text-xs uppercase tracking-widest text-muted-foreground">Eyebrow · names the beat, ~4 words</p>
          <h1 class="mt-4 text-5xl @2xl:text-7xl font-bold tracking-tight" style={{lineHeight: 1.05}}>The headline states the finding, with its number</h1>
          <p class="mt-6 text-lg text-muted-foreground max-w-prose">The standfirst earns the scroll in one sentence: why this matters and to whom.</p>
          <div class="mt-10 max-w-sm"><Question id={N} height="220px" /></div>
        </header>
        <section class="py-16 border-t border-border">
          <div class="flex items-baseline gap-6">
            <span class="text-7xl font-bold text-muted-foreground/25">01</span>
            <h2 class="text-3xl @2xl:text-4xl font-semibold max-w-2xl">Chapter headline: a claim, never a topic</h2>
          </div>
          <p class="mt-6 max-w-prose text-muted-foreground">Two to four sentences set up the chart — what to look at and why it matters.</p>
          <div class="mt-8 max-w-4xl"><Question id={N} height="430px" /></div>
          <p class="mt-3 text-sm text-muted-foreground max-w-prose">The caption states what the chart proves, at the data's precision.</p>
        </section>
        <aside class="-mx-6 @2xl:-mx-12 my-16 bg-foreground text-background py-20 px-6 text-center">
          <p class="text-sm uppercase tracking-widest opacity-70">The interlude: one number, no chart, full width</p>
          <div class="mt-6 mx-auto max-w-md"><Question id={N} height="200px" /></div>
        </aside>
        <section class="py-16 border-t border-border">
          <h2 class="text-3xl font-semibold max-w-2xl">The takeaway restates the lead with its earned weight</h2>
          <ul class="mt-6 space-y-3 max-w-prose">2-3 quantified takeaways, each with a live number, answering "so what should the reader do?"</ul>
        </section>
      </div>

      Do
      - One idea per chapter; split any section carrying two.
      - Give the nuance its own chapter ("dependable, and exposed") — one flagged caveat is more persuasive than none.
      - Vary chart heights with the beat (evidence 400-460px, single-values 180-260px).
      Don't
      - Every section a Card; centered-everything; all charts one height; topic headlines.
      - A second interlude — it is a breather, not a rhythm.

  deck:
    label: Deck
    description: Presentation deck — full-viewport slides in acts; quiet paper slides between full-bleed accent dividers.
    personality: >-
      A boardroom keynote rendered as a scroll: one idea per full-viewport slide, headlines you
      could speak aloud to the room, generous emptiness as the luxury. The deck moves in ACTS —
      quiet paper slides punctuated by full-bleed solid-accent dividers — and its structure is
      announced (contents, numbered acts), never discovered.
    beats:
      - Cover
      - Contents (mirrors the act titles)
      - Act divider (solid accent, per act)
      - Content slides (statement / columns / chart / table / big number)
      - Quote or image slide (a breather per act)
      - Timeline / roadmap
      - Close
    guidance: |-
      ## Deck — a presentation that scrolls

      Voice: a keynote. Every slide headline is a spoken sentence ("Retention pays for the price
      increase"), never a label ("Retention"). One idea per slide. A good slide is ~40% empty —
      put the air BELOW the content, not around it.

      THE SLIDE (every slide, no exceptions; fixed/sticky are banned — a slide is a tall section):
      - `<section class="min-h-[var(--mx-vh,760px)] flex flex-col border-b border-border py-14">` —
        `--mx-vh` is the reader's real viewport height (platform-provided), so each slide fills the
        screen; the fallback covers headless renders. Never vh units (broken in this surface).
      - HEADER BAND on every content slide: kicker `<p class="text-xs uppercase tracking-widest font-semibold text-primary">01 · ACT NAME</p>`
        + hairline `<hr class="mt-3 mb-10">`; then the slide h2. Same gutters, same band, every slide — the repetition IS the design.
      - FOOTER META closes every content slide: `<div class="mt-auto pt-10 flex justify-between text-xs text-muted-foreground"><span>Deck title — date</span><span class="font-semibold">07</span></div>`.

      ACTS AND COLOR RHYTHM (the interleaving that makes it feel designed):
      - Group slides into 2-4 numbered acts. Each act OPENS with a full-bleed solid-accent divider:
        `<section class="min-h-[var(--mx-vh,760px)] flex flex-col justify-center bg-primary text-primary-foreground -mx-6 @2xl:-mx-12 px-6 @2xl:px-12">`
        carrying a giant TONE-ON-TONE act numeral (same hue, darker: `<span class="text-9xl font-bold text-primary-foreground/25">02</span>`
        — or a darker literal of the accent) and the act title below it. Nothing else on the slide.
      - Dividers are the ONLY saturated slides; everything between is quiet paper. That alternation
        (paper… paper… ACCENT… paper) is the pulse of the deck — never color a content slide's ground.
      - The contents slide lists the acts as numbered rows (accent numerals, hairline row rules,
        `tabular-nums`) whose titles mirror the dividers EXACTLY.

      SLIDE TYPES (pick per beat; each stays one idea):
      - Statement: at most 3 one-line bullets with square accent markers
        (`<span class="inline-block size-2 bg-primary mr-3">`), then air. No paragraphs.
      - Columns (2 or 3): equal cells on one gutter, and EACH COLUMN OPENS UNDER A RULE
        (`<div class="border-t-2 border-foreground pt-3">` heading + short copy); columns top-align
        and share the line rhythm. Collapse to one column on phones (`@2xl:grid-cols-3`).
      - Quadrants: 2×2 grid with hairline cross rules (`divide-x divide-y divide-border`) and tiny
        muted axis labels at the edges ("← less … more →").
      - Chart slide: claim headline + ONE `<Question>` (430-460px, ≥ 60% width) + one takeaway line
        under it. Restyle via `viz` override: all series in grays, ONE accent element (the bar/line
        being discussed), direct labels, no legend where possible. Never two charts on a slide.
      - Big-number slide: one enormous accent figure — a styled single-value embed
        (`valueColor` = the accent, huge `valueFontSize`) — plus a two-line muted caption. NOTHING else.
        Use once or twice as an act's exclamation point.
      - Table slide: a compact table; uppercase tracked `<th>`, hairline row rules, `tabular-nums`.
      - Quote slide: display-size quote in `text-muted-foreground` (softer than headlines, not black),
        hanging quote mark, `— attribution` line. A breather between dense slides.
      - Timeline: a horizontal rail — uppercase tracked date labels over square nodes over bold
        labels + muted notes, one left edge per milestone; the CURRENT step is the one accent square.
      - Cover and Close share one grammar: kicker + hairline, huge flush-left title
        (`text-6xl @2xl:text-8xl tracking-tight`), one-line muted standfirst, byline/date at the foot.
        The close restates the lead number and the next step, then contact.

      Skeleton (cover → divider → chart slide; extend the pattern per act):

      <div data-design="tw" class="@container px-6 @2xl:px-12">
        <section class="min-h-[var(--mx-vh,760px)] flex flex-col border-b border-border py-14">
          <p class="text-xs uppercase tracking-widest font-semibold text-primary">Company · Quarter</p>
          <hr class="mt-3" />
          <h1 class="mt-auto text-6xl @2xl:text-8xl font-bold tracking-tight max-w-4xl">The title states the one finding</h1>
          <p class="mt-6 text-lg text-muted-foreground max-w-xl">A standfirst no longer than the breath it takes to say it.</p>
          <div class="mt-auto pt-10 flex justify-between text-xs text-muted-foreground"><span>Author</span><span>Date</span></div>
        </section>
        <section class="min-h-[var(--mx-vh,760px)] flex flex-col justify-center bg-primary text-primary-foreground -mx-6 @2xl:-mx-12 px-6 @2xl:px-12">
          <span class="text-9xl font-bold text-primary-foreground/25">01</span>
          <h2 class="mt-2 text-4xl @2xl:text-5xl font-semibold">Act title, mirrored in the contents</h2>
        </section>
        <section class="min-h-[var(--mx-vh,760px)] flex flex-col border-b border-border py-14">
          <p class="text-xs uppercase tracking-widest font-semibold text-primary">01 · ACT NAME</p>
          <hr class="mt-3 mb-10" />
          <h2 class="text-3xl @2xl:text-5xl font-semibold max-w-3xl">The headline is the takeaway, spoken aloud</h2>
          <div class="mt-10 max-w-5xl"><Question id={N} height="440px" /></div>
          <p class="mt-4 text-sm text-muted-foreground max-w-prose">One line under the chart: what to remember when the slide is gone.</p>
          <div class="mt-auto pt-10 flex justify-between text-xs text-muted-foreground"><span>Deck title — date</span><span class="font-semibold">07</span></div>
        </section>
      </div>

      Do
      - Speakable headlines; huge type, few words; the air below the content.
      - One accent element per figure; contents ↔ dividers mirrored to the word.
      Don't
      - Color a content slide's ground; two charts on a slide; paragraphs (three lines max).
      - Scroll-snap/parallax tricks; cramming a slide to avoid adding one — add the slide.

  scrolly:
    label: Scrolly
    description: Playful scrollytelling — a pudding.cool-style data story with a conceit, ticker bands, and chapter breaks.
    personality: >-
      Curious, witty, second-person — and DRESSED UP: the story wears a costume (a mission
      console, a field report, a race broadcast) and every element plays along. The scroll IS
      the story, suspense lives between chapters, and fun, visual stunningness is the point —
      serious about the data, theatrical about everything else.
    beats:
      - Console hero / cold open (the conceit announces itself)
      - Ticker band
      - Chapters (3-5), each opened by a page-break band
      - Twist
      - Payoff
      - Methodology footer
    guidance: |-
      ## Scrolly — the playful data story

      Voice: curious, witty, second person ("you'd expect X — that's not what happened").
      Honesty rules hold: the humor is in the telling, never at the data's expense.

      THE CONCEIT (the single biggest lever): invent a fiction the data lives inside — a mission
      console, a case file, a broadcast — and commit EVERY element to it: name the fake console
      ("STRAIT WATCH · TRAFFIC MONITOR"), chapter labels in its voice ("SITREP 02 · THE
      CHOKEPOINT"), figure numbers ("FIG.03"), status chips ("● STATUS: CLOSED"), timestamps
      ("AS OF 17 JUN · 00:00Z"). Mono uppercase letter-spaced type (`font-mono text-xs uppercase
      tracking-widest`) is the conceit's voice for ALL labels. One conceit, total commitment.

      THE FUN KIT (compose 4-6 per story; pace them, never all on one screen):
      - Console topbar: a slim full-bleed bar opening the story — conceit name left, status chip
        and timestamp right, strong rule below. It scrolls away (fixed/sticky stay banned).
      - Two-tone headline: huge condensed uppercase claim with THE one word in the accent —
        `<h1 class="text-6xl @2xl:text-8xl font-bold uppercase tracking-tight">The strait went <span class="text-primary">dark.</span></h1>`.
      - Ticker band (marquee): a full-bleed accent strip of repeating key stats
        ("··· CARGO -97% ··· DAILY 95→5 ··· WAR 28 FEB ···"). A `<style>` block with an
        `@keyframes` translateX(-50%) loop on a `flex whitespace-nowrap` row duplicated twice
        inside an `overflow-hidden` band. The ONE sanctioned continuous animation — use it as a
        section seam, once or twice, ~20s slow.
      - Page-break band: chapters open with a full-bleed inverted strip (`bg-foreground
        text-background -mx-6 @2xl:-mx-12 py-10`) carrying a small centered mono label ("↓
        SITREP 04 · THE STANDOFF NOW") and a GIANT ghost chapter numeral bleeding off one edge —
        outline text via a scoped `<style>` rule (`-webkit-text-stroke: 2px` in the accent,
        `color: transparent`) or a huge 15%-opacity numeral. Large type IS the decoration.
      - Stamped section label: the chapter kicker in a bordered, slightly rotated box
        (`inline-block border-2 border-foreground px-3 py-1 -rotate-2 font-mono text-xs
        uppercase tracking-widest`) with an italic muted aside sitting beside it.
      - Hard-shadow chart slab: charts sit in framed cards with an OFFSET SOLID shadow — a solid
        color block behind the graph, no blur, printed-poster feel: `border-2 border-foreground
        shadow-[8px_8px_0_0_var(--primary)]` (or the foreground token; alternate per chapter).
      - Figure spec strip: under each chart, a dashed-top footer row — `FIG.02 · WHAT IT SHOWS`
        left, an accent annotation right ("MAR ONWARD: THE GAP").
      - Dashed stat cards: `border-2 border-dashed border-foreground/60` cards — mono kicker, a
        giant accent single-value embed, one-line caption. Arrow notation for change ("3,253 → 129"
        — as a suffix in the embed's columnFormats, still live).
      - Chip row: small bordered mono tags of the key facts under the hero ("TANKERS 43%",
        "DAILY 95→5", "● CLOSED").
      - Texture: a faint blueprint grid on quiet sections via one scoped `<style>` rule
        (`repeating-linear-gradient` hairlines every ~48px at ~4% opacity), barely-there.
      - Drop cap: each chapter's first paragraph opens with a huge accent initial (floated
        `<span>`); pure ornament — every data number is still a live embed.

      STRUCTURE: console hero (conceit topbar → two-tone claim → one-sentence setup → the ONE
      stat enormous with its spec caption → chip row) → ticker seam → chapters, each: page-break
      band → stamped label + italic aside → two-tone headline → short 2-column prose
      (`@3xl:grid-cols-2`, three sentences per column max) → slab-framed chart with spec strip,
      dashed stat cards beside it (`@3xl:grid-cols-[3fr_2fr]`) → the TWIST chapter breaks the
      pattern (inverted ground, or the evolving chart: re-embed the SAME question across steps
      with progressive `viz` overrides — gray, then one series accented, then the domain zoomed;
      the platform's scrolly scene, no sticky needed) → PAYOFF: the full-width chart and the
      moral in one huge two-tone sentence → small honest methodology footer in the conceit's
      voice ("END OF TRANSMISSION · sources, window, exclusions").

      Do
      - Commit to the conceit in every label; alternate dark/light grounds between chapters.
      - One reveal per chapter; direct-label the thing being followed; captions do jokes AND work.
      Don't
      - Fake sticky scenes; walls of prose; two conceits; a payoff without its number; the whole
        fun kit on one screen.

themes:
  modernist: |-
    Modernist — Swiss editorial discipline. The red `--primary` is the ONLY hue on the page and
    it always means the subject; everything else is ink on paper. Keep everything flush left —
    headlines, copy, even wide CTA-like elements; centered text is off-brand. Dividers are
    strong (`border-t-2 border-foreground`), never decorative hairlines everywhere.
    Charts: all series in grays (`--muted-foreground`), the focal series red; direct labels over
    legends; no gradient fills.
    Structural: `<hr>` renders as a strong 2px ink rule and `<blockquote>` carries a bold top
    rule — use them as section dividers instead of hand-styled borders.
    Do: visible grid, generous white, uppercase tracked eyebrows, one red element per viewport.
    Don't: round a corner (radius is 0 on purpose), gradients, shadows, a second accent hue,
    tinted or decorative imagery.
  classical: |-
    Classical — bookish print. Serif air, generous leading, hairline rules; the ochre accent is
    an illuminator's ink: initials, rules, the focal series — never large fills. Drop caps and
    small-caps kickers are welcome; figures may sit in the margin like plates in an atlas.
    Charts: muted earth tones with the ochre focal series; serif axis labels feel right here.
    Structural: `<hr>` is a hairline; `<blockquote>` sets italic with a fine left rule — both
    already in the bookish voice.
    Do: wide margins, `max-w-prose` columns, numbered figures with captions ("Fig. 2 — …").
    Don't: neon or saturated hues, heavy shadows, condensed grotesque headlines, large radii,
    dense borderless tables.
  nocturne: |-
    Nocturne — dark-first. ALWAYS set `colorMode: "dark"` and design for dark only. Violet is
    the focal voice, cyan the support; `JetBrains Mono` for figures and axis text; a restrained
    glow (a soft primary-tinted shadow on the hero number) is on-brand.
    Charts: luminous lines on the deep field; keep gridlines barely-there; two lit hues max per view.
    Structural: `<hr>` renders as a fading violet gradient line — a ready-made scene divider.
    Do: big luminous hero numbers, mono `tabular-nums` KPI rows, deep layered card surfaces.
    Don't: light/white cards, unpaired light-mode utilities, pastel fills, three glowing colors
    in one chart, long paragraphs in pure white (soften to the muted foreground).
  organic: |-
    Organic — warm, rounded, human. `rounded-2xl` and up, soft shadows, terracotta focal with
    olive support; the voice is friendly and the shapes agree with it. Whitespace is soft, not
    architectural — sections breathe into each other.
    Charts: terracotta focal, olive secondary; area fills at low opacity feel at home here.
    Structural: `<hr>` is a short rounded terracotta dash (a friendly beat mark, not a wall);
    `<blockquote>` becomes a soft rounded tinted block.
    Do: rounded chart containers, pill badges, warm muted backgrounds alternating with cream.
    Don't: hard edges or 0-radius anything, pure black text, corporate blue, airless dense
    tables, neon accents.
  broadsheet: |-
    Broadsheet — newsprint. Ink on paper with steel-blue as the highlighter; column rules
    (`divide-x` hairlines), small-caps kickers, serif headlines, and tables treated as
    first-class graphics with strong header rules.
    Charts: ink-gray series with the steel-blue focal; direct labels over legends; no fills
    brighter than the accent.
    Structural: `<hr>` renders as the classic double newspaper rule and table `<th>` sets in
    tracked small caps — native tables already look typeset.
    Do: multi-column layouts (`@3xl:columns-2` for long prose), datelines, ruled section
    headers, dense-but-ordered stat tables.
    Don't: playful color, large radii, gradients, oversized decoration, centered body copy.
  industry: |-
    Industry — the engineering report. Slate ground, industrial blue as the working color, and
    safety orange RESERVED for the one exception being discussed (the outlier, the alert, the
    threshold breach) — if everything is orange, nothing is. Square corners, mono figures,
    visible grid discipline.
    Charts: blue primary, gray context series, orange only on the flagged element; reference
    lines and thresholds drawn explicitly.
    Structural: `<hr>` is a dashed engineering rule; tables default to tabular figures with
    uppercase headers — spec-sheet look for free.
    Do: spec-sheet tables, labeled thresholds, `tabular-nums`, section numbering (1.0, 1.1).
    Don't: pastels, decorative serifs, rounded cards, orange as decoration, unlabeled axes.
